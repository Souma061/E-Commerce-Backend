<style>
  html,
  body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  #erd-shell {
    position: relative;
    height: 100vh;
    overflow: hidden;
    background: #fff;
  }

  #erd {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #erd.is-panning {
    cursor: grabbing;
  }

  #erd svg {
    width: 100%;
    height: 100%;
    max-width: none !important;
    user-select: none;
  }

  #erd-controls {
    position: absolute;
    z-index: 2;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    padding: 6px;
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid #d9d0e7;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(43, 31, 63, 0.12);
  }

  #erd-controls button {
    width: 36px;
    height: 34px;
    border: 0;
    border-radius: 7px;
    color: #3b2463;
    background: #f2edf9;
    font: 700 18px/1 sans-serif;
    cursor: pointer;
  }

  #erd-controls button:hover {
    color: #fff;
    background: #66508f;
  }

  #erd svg.erDiagram .divider path {
    stroke-opacity: 0.5;
  }

  #erd svg.erDiagram .row-rect-odd path,
  #erd svg.erDiagram .row-rect-odd rect,
  #erd svg.erDiagram .row-rect-even path,
  #erd svg.erDiagram .row-rect-even rect {
    stroke: none !important;
  }

  #erd svg.erDiagram text {
    fill: #302b3f !important;
  }

  #erd svg.erDiagram .entityLabel {
    fill: #3b2463 !important;
    font-weight: 700;
  }

  #erd svg.erDiagram .relationshipLine {
    stroke: #66508f !important;
    stroke-width: 1.6px !important;
    stroke-opacity: 0.72 !important;
    cursor: pointer;
    transition:
      stroke-width 0.15s,
      stroke-opacity 0.15s;
  }

  #erd svg.erDiagram .relationshipLine:hover {
    stroke: #d14f76 !important;
    stroke-width: 4px !important;
    stroke-opacity: 1 !important;
  }

  #erd svg.erDiagram .node {
    cursor: pointer;
    transition: filter 0.15s;
  }

  #erd svg.erDiagram .node:hover {
    filter: drop-shadow(0 4px 5px rgba(59, 36, 99, 0.28));
  }

  #erd svg.erDiagram marker path,
  #erd svg.erDiagram marker circle {
    fill: #ffffff !important;
    stroke: #66508f !important;
    stroke-width: 1.6px !important;
  }

  #erd svg.erDiagram .relationshipLabel {
    fill: #34234f !important;
    font-size: 14px !important;
    font-weight: 700;
  }

  #erd svg.erDiagram .relationshipLabelBox {
    fill: #fffdf8 !important;
    stroke: #c8b9df !important;
    stroke-width: 1px !important;
    opacity: 1;
  }
</style>
<div id="erd-shell">
  <div id="erd-controls" aria-label="Diagram controls">
    <button type="button" data-action="in" title="Zoom in">+</button>
    <button type="button" data-action="out" title="Zoom out">−</button>
    <button type="button" data-action="reset" title="Reset view">↺</button>
  </div>
  <div id="erd"></div>
</div>
<script type="module">
  import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  await document.fonts.ready;
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    fontFamily: '"Anthropic Sans", sans-serif',
    themeVariables: {
      darkMode: dark,
      fontSize: '13px',
      fontFamily: '"Anthropic Sans", sans-serif',
      lineColor: '#66508f',
      textColor: '#302b3f',
      primaryTextColor: '#302b3f',
      secondaryTextColor: '#302b3f',
      tertiaryTextColor: '#302b3f',
      relationLabelColor: '#514b5f',
    },
  });
  const src = `
erDiagram
USER ||--o{ ADDRESS : has
USER ||--o{ ORDER : places
USER ||--o{ REVIEW : writes
USER ||--o| CART : owns
USER ||--o{ PRODUCT : sells

CATEGORY ||--o{ PRODUCT : contains

PRODUCT ||--|{ PRODUCT_VARIANT : has
PRODUCT ||--o{ REVIEW : receives
PRODUCT ||--o{ ORDER_ITEM : referenced_by

PRODUCT_VARIANT ||--o{ CART_ITEM : added_as
PRODUCT_VARIANT ||--o{ ORDER_ITEM : referenced_by
PRODUCT_VARIANT ||--o{ STOCK_MOVEMENT : tracked_by

CART ||--o{ CART_ITEM : contains

ORDER ||--|{ ORDER_ITEM : contains
ORDER ||--|| ORDER_ADDRESS : ships_to
ORDER ||--o{ PAYMENT : has_attempts

USER {
uuid user_id PK
string email UK
string password_hash
string role
string name
datetime created_at
datetime updated_at
}

ADDRESS {
uuid address_id PK
uuid user_id FK
string name
string street
string city
string state
string zip
string country
string phone
string address_type
boolean is_default
datetime created_at
datetime updated_at
}

CATEGORY {
uuid category_id PK
string name
string slug UK
string description
datetime created_at
datetime updated_at
}

PRODUCT {
uuid product_id PK
uuid category_id FK
uuid seller_id FK
string title
string slug UK
string description
boolean is_active
datetime created_at
datetime updated_at
}

PRODUCT_VARIANT {
uuid variant_id PK
uuid product_id FK
string sku UK
string name
string size
string color
decimal price
int stock_quantity
boolean is_active
datetime created_at
datetime updated_at
}

REVIEW {
uuid review_id PK
uuid product_id FK
uuid user_id FK
string title
string content
int rating
datetime created_at
datetime updated_at
}

CART {
uuid cart_id PK
uuid user_id FK
datetime expires_at
datetime created_at
datetime updated_at
}

CART_ITEM {
uuid cart_item_id PK
uuid cart_id FK
uuid variant_id FK
int quantity
datetime created_at
datetime updated_at
}

ORDER {
uuid order_id PK
uuid user_id FK
string status
decimal subtotal_amount
decimal shipping_amount
decimal discount_amount
decimal total_amount
string currency
datetime created_at
datetime updated_at
}

ORDER_ADDRESS {
uuid order_address_id PK
uuid order_id FK
string name
string street
string city
string state
string zip
string country
string phone
datetime created_at
}

ORDER_ITEM {
uuid order_item_id PK
uuid order_id FK
uuid product_id FK
uuid variant_id FK
string product_title
string variant_name
string sku
int quantity
decimal unit_price
decimal total_price
datetime created_at
}

PAYMENT {
uuid payment_id PK
uuid order_id FK
decimal amount
string currency
string status
string idempotency_key UK
string gateway
string gateway_txn_id 
string error_message
datetime paid_at
datetime created_at
datetime updated_at
}

STOCK_MOVEMENT {
uuid movement_id PK
uuid variant_id FK
int change_qty
string reason
uuid reference_id
datetime created_at
}


`;

  const { svg } = await mermaid.render('erd-svg', src);
  document.getElementById('erd').innerHTML = svg;

  document.querySelectorAll('#erd svg.erDiagram .node').forEach((node) => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs),
      y = Math.min(...ys);
    const w = Math.max(...xs) - x,
      h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a))
        rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });

  document
    .querySelectorAll(
      '#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path',
    )
    .forEach((p) => {
      p.setAttribute('stroke', 'none');
    });

  // Interactive pan and zoom.
  const erd = document.getElementById('erd');
  const diagram = erd.querySelector('svg');
  const initial = diagram.viewBox.baseVal;
  const home = {
    x: initial.x,
    y: initial.y,
    width: initial.width,
    height: initial.height,
  };
  let view = { ...home };
  let drag = null;

  const draw = () =>
    diagram.setAttribute(
      'viewBox',
      `${view.x} ${view.y} ${view.width} ${view.height}`,
    );
  const zoom = (factor, clientX, clientY) => {
    const bounds = diagram.getBoundingClientRect();
    const px = clientX ?? bounds.left + bounds.width / 2;
    const py = clientY ?? bounds.top + bounds.height / 2;
    const anchorX = view.x + ((px - bounds.left) / bounds.width) * view.width;
    const anchorY = view.y + ((py - bounds.top) / bounds.height) * view.height;
    const nextWidth = Math.min(
      home.width * 3,
      Math.max(home.width * 0.18, view.width * factor),
    );
    const nextHeight = nextWidth * (view.height / view.width);
    const ratioX = (px - bounds.left) / bounds.width;
    const ratioY = (py - bounds.top) / bounds.height;
    view = {
      x: anchorX - nextWidth * ratioX,
      y: anchorY - nextHeight * ratioY,
      width: nextWidth,
      height: nextHeight,
    };
    draw();
  };

  erd.addEventListener(
    'wheel',
    (event) => {
      event.preventDefault();
      zoom(event.deltaY > 0 ? 1.12 : 0.88, event.clientX, event.clientY);
    },
    { passive: false },
  );

  erd.addEventListener('pointerdown', (event) => {
    if (event.button !== 0) return;
    drag = { x: event.clientX, y: event.clientY, viewX: view.x, viewY: view.y };
    erd.classList.add('is-panning');
    erd.setPointerCapture(event.pointerId);
  });
  erd.addEventListener('pointermove', (event) => {
    if (!drag) return;
    const bounds = diagram.getBoundingClientRect();
    view.x =
      drag.viewX - ((event.clientX - drag.x) * view.width) / bounds.width;
    view.y =
      drag.viewY - ((event.clientY - drag.y) * view.height) / bounds.height;
    draw();
  });
  erd.addEventListener('pointerup', (event) => {
    drag = null;
    erd.classList.remove('is-panning');
    erd.releasePointerCapture(event.pointerId);
  });

  document.getElementById('erd-controls').addEventListener('click', (event) => {
    const action = event.target.closest('button')?.dataset.action;
    if (action === 'in') zoom(0.8);
    if (action === 'out') zoom(1.25);
    if (action === 'reset') {
      view = { ...home };
      draw();
    }
  });
  erd.addEventListener('dblclick', () => {
    view = { ...home };
    draw();
  });
</script>
